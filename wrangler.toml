name = "enterprise-experience-injector"
main = "src/worker.js"
compatibility_date = "2026-06-30"

workers_dev = true

kv_namespaces = [
  { binding = "EEI_CONFIG", id = "3a9f49717d20454c9c948be9112aedd4", preview_id = "58948a1c5a334442b1dcd5ed9336c77d" }
]

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
SIGNIA_BIRTHDAY_URL = "https://signia.casitaapps.com/api/export/employees/today-birthdays"
FOOTBALL_DATA_BASE_URL = "https://api.football-data.org/v4"
FOOTBALL_DATA_COMPETITION_CODE = "WC"
FOOTBALL_DATA_SEASON = "2026"

# Optional production secrets:
# wrangler secret put EEI_ADMIN_TOKEN
# wrangler secret put FOOTBALL_DATA_API_TOKEN
# wrangler secret put UPSTREAM_ORIGIN
