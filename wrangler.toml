name = "enterprise-experience-injector"
main = "src/worker.js"
compatibility_date = "2026-06-30"

workers_dev = true

kv_namespaces = [
  { binding = "EEI_CONFIG", id = "replace-with-production-kv-id", preview_id = "replace-with-preview-kv-id" }
]

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
SIGNIA_BIRTHDAY_URL = "https://signia.casitaapps.com/api/export/employees/today-birthdays"

# Optional production secrets:
# wrangler secret put EEI_ADMIN_TOKEN
# wrangler secret put UPSTREAM_ORIGIN
